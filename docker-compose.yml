version: '3.8'

services:
  backend:
    build: ./backend
    container_name: goe-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_URI=postgresql://goe_user:goe_password@postgres:5432/goe_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - neo4j
      - qdrant
      - postgres
      - redis

  neo4j:
    image: neo4j:5.12.0
    container_name: goe-neo4j
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: goe-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:15-alpine
    container_name: goe-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=goe_user
      - POSTGRES_PASSWORD=goe_password
      - POSTGRES_DB=goe_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: goe-redis
    ports:
      - "6379:6379"

volumes:
  neo4j_data:
  qdrant_data:
  postgres_data:
